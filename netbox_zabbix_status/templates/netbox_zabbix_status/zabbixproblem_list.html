{% extends 'generic/object_list.html' %}

{% block extra_controls %}
  <form method="post" action="{% url 'plugins:netbox_zabbix_status:refresh' %}" class="d-inline">
    {% csrf_token %}
    <input type="hidden" name="return_url" value="{{ request.get_full_path }}">
    <button type="submit" class="btn btn-outline-secondary" title="Triggers an immediate sync from Zabbix">
      <i class="mdi mdi-refresh"></i> Refresh from Zabbix
    </button>
  </form>
  {{ block.super }}
{% endblock %}
